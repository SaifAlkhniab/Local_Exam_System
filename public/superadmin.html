<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin IT Portal — SLEP</title>
    <style>
        :root {
            /* Legacy aliases (keep for inline styles & JS-generated HTML) */
            --primary:   #1E1B4B;
            --secondary: #312E81;
            --accent:    #8B5CF6;
            --success:   #10B981;
            --danger:    #EF4444;
            --bg:        #F3F0FF;

            /* Violet scale for super admin */
            --violet-900: #2E1065;
            --violet-800: #3B0764;
            --violet-700: #4C1D95;
            --violet-600: #6D28D9;
            --violet-500: #7C3AED;
            --violet-400: #8B5CF6;
            --violet-300: #A78BFA;
            --violet-200: #DDD6FE;
            --violet-100: #EDE9FE;
            --violet-50:  #F5F3FF;

            /* Neutrals */
            --gray-900: #111827;
            --gray-800: #1F2937;
            --gray-700: #374151;
            --gray-600: #4B5563;
            --gray-500: #6B7280;
            --gray-400: #9CA3AF;
            --gray-300: #D1D5DB;
            --gray-200: #E5E7EB;
            --gray-100: #F3F4F6;
            --gray-50:  #F9FAFB;

            /* Glass */
            --glass-bg:     rgba(255,255,255,0.76);
            --glass-border: rgba(255,255,255,0.92);

            /* Shadows */
            --shadow-sm: 0 1px 4px rgba(0,0,0,0.07);
            --shadow-md: 0 4px 20px rgba(0,0,0,0.09);

            /* Radius */
            --r-sm: 8px;
            --r-md: 12px;
            --r-lg: 18px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--gray-800);
            min-height: 100vh;
        }

        /* ── NAVBAR ── */
        .navbar {
            background: linear-gradient(90deg, #1E1B4B 0%, #3B0764 100%);
            color: white;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 20px rgba(0,0,0,0.25);
        }
        .navbar h1 {
            margin: 0;
            font-size: 19px;
            font-weight: 700;
            color: #EDE9FE;
            letter-spacing: 0.01em;
        }
        .navbar span {
            font-size: 12px;
            background: rgba(139,92,246,0.35);
            border: 1px solid rgba(139,92,246,0.5);
            color: #DDD6FE;
            padding: 5px 14px;
            border-radius: 999px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        /* ── GRID LAYOUT ── */
        .container {
            padding: 28px 32px;
            max-width: 1260px;
            margin: auto;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 24px;
        }

        /* ── CARDS ── */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--glass-border);
            border-radius: var(--r-lg);
            padding: 26px;
            box-shadow: var(--shadow-md);
        }

        .card h2 {
            margin-top: 0;
            color: var(--gray-800);
            font-size: 16px;
            font-weight: 700;
            border-bottom: 1px solid var(--gray-200);
            padding-bottom: 12px;
            margin-bottom: 20px;
        }

        /* ── FORM ── */
        label {
            display: block;
            font-weight: 700;
            margin-bottom: 6px;
            font-size: 12px;
            color: var(--gray-600);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        input {
            width: 100%;
            padding: 10px 13px;
            margin-bottom: 14px;
            border: 1.5px solid var(--gray-200);
            border-radius: var(--r-sm);
            font-size: 14px;
            font-family: inherit;
            color: var(--gray-800);
            background: white;
            box-sizing: border-box;
            transition: border-color 0.18s, box-shadow 0.18s;
        }
        input:focus {
            outline: none;
            border-color: var(--violet-400);
            box-shadow: 0 0 0 3px rgba(139,92,246,0.15);
        }
        input[type="file"] {
            padding: 8px 10px;
            background: var(--gray-50);
            cursor: pointer;
            font-size: 13px;
        }

        /* ── BUTTONS ── */
        button {
            padding: 11px 18px;
            border: none;
            border-radius: var(--r-sm);
            font-weight: 700;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            color: white;
            background: var(--violet-500);
            width: 100%;
            margin-bottom: 10px;
            transition: opacity 0.18s, transform 0.15s;
        }
        button:hover { opacity: 0.88; }

        .btn-danger {
            background: var(--danger) !important;
            width: auto !important;
            padding: 5px 10px !important;
            font-size: 12px !important;
        }

        /* ── TABLE ── */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
            font-size: 13px;
        }
        th, td {
            padding: 11px 13px;
            text-align: left;
            border-bottom: 1px solid var(--gray-100);
        }
        th {
            background: var(--gray-50);
            font-size: 11px;
            font-weight: 700;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        tr:last-child td { border-bottom: none; }
        tbody tr:hover td { background: var(--violet-50); }

        /* Status badges in JS-generated HTML */
        span[style*="background:#27ae60"] { background: #D1FAE5 !important; color: #065F46 !important; border-radius: 999px !important; }
        span[style*="background:#7f8c8d"] { background: var(--gray-100) !important; color: var(--gray-600) !important; border-radius: 999px !important; }

        /* Responsive */
        @media (max-width: 860px) {
            .container { grid-template-columns: 1fr; padding: 20px; }
        }
    </style>
</head>
<body>

<script>
    // Ask for password on load and store in memory for this session
    const adminKey = prompt("Super Admin Password Required:");
    if (!adminKey) { document.body.innerHTML = "<h1 style='text-align:center; margin-top:50px;'>Access Denied</h1>"; throw new Error("Stop"); }

    // Helper function to easily make authenticated fetch requests
    async function apiCall(endpoint, options = {}) {
        options.headers = options.headers || {};
        // Only set Content-Type if it's not a FormData object (for CSV uploads)
        if (!(options.body instanceof FormData)) {
            options.headers['Content-Type'] = 'application/json';
        }
        options.headers['x-admin-key'] = adminKey;
        
        const res = await fetch(endpoint, options);
        if (res.status === 401) { alert("Invalid Super Admin Password!"); window.location.reload(); }
        return res.json();
    }
</script>

<div class="navbar">
    <h1>Super Admin IT Portal</h1>
    <span>Faculty Management</span>
</div>

<div class="container">
    <div class="card">
        <h2>Add New Professor</h2>
        <label>Full Name</label>
        <input type="text" id="profName" placeholder="Dr. John Doe">
        <label>Username</label>
        <input type="text" id="profUser" placeholder="jdoe">
        <label>Password</label>
        <input type="password" id="profPass" placeholder="Temporary Password">
        <button onclick="addProfessor()">Create Account</button>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
        
        <h2>Bulk Import (CSV)</h2>
        <button onclick="downloadTemplate()" style="background: #f39c12; color: white;">1. Download Blank Template</button>
        <p style="font-size: 12px; color: #666;">Format: username,password,name</p>
        <input type="file" id="csvFile" accept=".csv">
        <button onclick="uploadCsv()" style="background: #27ae60;">Upload Faculty CSV</button>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 style="border: none; margin: 0; padding: 0;">Faculty Roster</h2>
            <button onclick="exportCsv()" style="width: auto; background: #34495e;">Export CSV</button>
        </div>
        <table id="profTable">
            <tr><th>#</th><th>Name</th><th>Username</th><th>Status</th><th>Actions</th></tr>
        </table>
    </div>
</div>

<script>
    let profData = [];

    async function loadProfessors() {
        profData = await apiCall('/api/super/professors');
        const table = document.getElementById('profTable');
        table.innerHTML = `<tr><th>#</th><th>Name</th><th>Username</th><th>Status</th><th>Actions</th></tr>`;
        
        profData.forEach((p, index) => {
            const rowNumber = index + 1; // Creates sequential 1, 2, 3...
            
            const statusBadge = p.is_active 
                ? `<span style="background:#27ae60; color:white; padding:3px 8px; border-radius:12px; font-size:12px;">Active</span>` 
                : `<span style="background:#7f8c8d; color:white; padding:3px 8px; border-radius:12px; font-size:12px;">Disabled</span>`;
            
            const toggleBtnStr = p.is_active ? "Disable" : "Enable";
            const toggleColor = p.is_active ? "#f39c12" : "#2980b9";

            table.innerHTML += `<tr>
                <td>${rowNumber}</td>
                <td><strong>${p.name}</strong></td>
                <td>${p.username}</td>
                <td>${statusBadge}</td>
                <td style="display: flex; gap: 5px;">
                    <button style="background:#8e44ad; width:auto; padding:5px 10px; font-size:12px;" onclick="resetPassword(${p.id}, '${p.username}')">Reset Pass</button>
                    <button style="background:${toggleColor}; width:auto; padding:5px 10px; font-size:12px;" onclick="toggleProfessor(${p.id})">${toggleBtnStr}</button>
                    <button class="btn-danger" onclick="deleteProfessor(${p.id})">Delete</button>
                </td>
            </tr>`;
        });
    }

    async function addProfessor() {
        const payload = {
            name: document.getElementById('profName').value,
            username: document.getElementById('profUser').value,
            password: document.getElementById('profPass').value
        };
        if(!payload.name || !payload.username || !payload.password) return alert("Fill all fields");

        const res = await apiCall('/api/super/professors', { method: 'POST', body: JSON.stringify(payload) });
        if (res.success) {
            document.getElementById('profName').value = '';
            document.getElementById('profUser').value = '';
            document.getElementById('profPass').value = '';
            loadProfessors();
        } else {
            alert(res.error);
        }
    }

    async function deleteProfessor(id) {
        if(!confirm("Are you sure you want to delete this professor? All their data will be orphaned!")) return;
        await apiCall(`/api/super/professors/${id}`, { method: 'DELETE' });
        loadProfessors();
    }

    async function toggleProfessor(id) {
        await apiCall(`/api/super/professors/${id}/toggle`, { method: 'POST' });
        loadProfessors();
    }

    async function resetPassword(id, username) {
        const newPassword = prompt(`Enter a new password for ${username}:`);
        if (!newPassword) return; // Cancel if empty

        const res = await apiCall(`/api/super/professors/${id}/reset-password`, { 
            method: 'POST', 
            body: JSON.stringify({ newPassword }) 
        });
        
        if (res.success) {
            alert(`Password for ${username} updated successfully!`);
        } else {
            alert("Error: " + res.error);
        }
    }

    async function uploadCsv() {
        const fileInput = document.getElementById('csvFile');
        if (!fileInput.files[0]) return alert("Please select a CSV");

        const formData = new FormData();
        formData.append('csvfile', fileInput.files[0]);

        const res = await apiCall('/api/super/import-professors', { method: 'POST', body: formData });
        if(res.success) { alert(res.message); loadProfessors(); }
    }

    // NEW: Download the exact template with sample Arabic data
    function downloadTemplate() {
        const bom = "\uFEFF"; // This hidden character forces Excel to read Arabic correctly
        const csvContent = "username,password,name\nprof_ali,pass123,د. علي\nprof_fatima,pass456,د. فاطمة";
        
        const blob = new Blob([bom + csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "Professor_Upload_Template.csv";
        document.body.appendChild(link); link.click(); link.remove();
    }

    // UPDATED: Fixed Arabic export bug
    function exportCsv() {
        let csv = "id,username,name\n";
        profData.forEach(p => csv += `${p.id},${p.username},${p.name}\n`);
        
        const bom = "\uFEFF"; // Forces Excel to read Arabic correctly
        const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
        
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "Faculty_Roster.csv";
        document.body.appendChild(link); link.click(); link.remove();
    }

    // Init
    loadProfessors();
</script>
</body>
</html>
