<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Exam</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; padding: 20px; max-width: 800px; margin: auto; user-select: none; }
        .header { background: #0056b3; color: white; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100;}
        .timer { font-size: 24px; font-weight: bold; background: white; color: #dc3545; padding: 5px 15px; border-radius: 5px; }
        .question-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-top: 20px; }
        .options label { display: block; padding: 10px; background: #f8f9fa; margin: 8px 0; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; }
        .options label:hover { background: #e2e6ea; }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; box-sizing: border-box;}
        button.submit-btn { background: #28a745; color: white; border: none; padding: 15px; font-size: 18px; width: 100%; border-radius: 5px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="header">
    <div id="studentInfo">Student Name</div>
    <div class="timer" id="timerDisplay">--:--</div>
</div>

<div id="examContainer">Loading questions...</div>
<button class="submit-btn" id="submitBtn" onclick="submitExam()">Submit Exam Now</button>

<script>
    // Security: Disable Right Click & Copy
    document.addEventListener('contextmenu', event => event.preventDefault());
    document.addEventListener('copy', event => event.preventDefault());
    
    let violations = 0;
    document.addEventListener("visibilitychange", () => {
        if (document.hidden) { violations++; alert("WARNING: Tab switch detected. Violation Logged."); }
    });

    const studentId = localStorage.getItem('studentId');
    const examId = localStorage.getItem('examId');
    let timeRemaining = parseInt(localStorage.getItem('duration')) * 60;
    
    if (!studentId || !examId) window.location.href = '/';
    document.getElementById('studentInfo').innerText = localStorage.getItem('studentName');

    // Force Fullscreen
    document.body.requestFullscreen().catch(err => console.log("Fullscreen bypass"));

    // Timer Logic
    const timerInterval = setInterval(() => {
        timeRemaining--;
        let m = Math.floor(timeRemaining / 60);
        let s = timeRemaining % 60;
        document.getElementById('timerDisplay').innerText = `${m}:${s < 10 ? '0':''}${s}`;
        
        if (timeRemaining <= 0) {
            clearInterval(timerInterval);
            alert("Time is up! Auto-submitting your answers.");
            submitExam();
        }
    }, 1000);

    async function loadQuestions() {
        const res = await fetch(`/api/student/exam/${examId}`);
        const questions = await res.json();
        const container = document.getElementById('examContainer');
        container.innerHTML = '';
        
        // Shuffle questions
        questions.sort(() => 0.5 - Math.random()).forEach((q, i) => {
            let inputHtml = '';
            if (q.q_type === 'mcq') {
                // Shuffle options A, B, C, D
                const opts = [
                    `<label><input type="radio" name="q_${q.id}" value="option_a"> ${q.option_a}</label>`,
                    `<label><input type="radio" name="q_${q.id}" value="option_b"> ${q.option_b}</label>`,
                    `<label><input type="radio" name="q_${q.id}" value="option_c"> ${q.option_c}</label>`,
                    `<label><input type="radio" name="q_${q.id}" value="option_d"> ${q.option_d}</label>`
                ].sort(() => 0.5 - Math.random()).join('');
                inputHtml = `<div class="options">${opts}</div>`;
            } else {
                inputHtml = `<input type="text" name="q_${q.id}" placeholder="Type your answer here...">`;
            }

            container.innerHTML += `
                <div class="question-card">
                    <h3>Q${i + 1} (${q.points} pts): ${q.question_text}</h3>
                    ${q.image_url ? `<img src="/images/${q.image_url}" style="max-width:100%; border-radius:5px;">` : ''}
                    ${inputHtml}
                </div>`;
        });
    }

    async function submitExam() {
        clearInterval(timerInterval);
        const answers = {};
        
        // Get MCQ
        document.querySelectorAll('input[type="radio"]:checked').forEach(r => answers[r.name.split('_')[1]] = r.value);
        // Get Fill in the Blank
        document.querySelectorAll('input[type="text"]').forEach(t => { if(t.value) answers[t.name.split('_')[1]] = t.value });

        const res = await fetch('/api/student/submit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ examId, studentId, answers, violations })
        });
        const result = await res.json();

        if (result.success) {
            document.body.innerHTML = `<div style="text-align:center; padding: 50px; font-family: Arial;">
                <h1 style="color: #28a745;">Exam Submitted Successfully</h1>
                <h2>Your Grade: ${result.score} / ${result.max_score}</h2>
                <p>Violations Logged: ${violations}</p>
                <button onclick="window.location.href='/'" style="padding:10px 20px; cursor:pointer;">Return Home</button>
            </div>`;
            localStorage.clear();
        }
    }

    loadQuestions();
</script>
</body>
</html>
