<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal — SLEP</title>
    <style>
        :root {
            /* Legacy aliases (JS-generated HTML uses these) */
            --primary:   #2563EB;
            --accent:    #3B82F6;
            --bg:        #F0F7FF;
            --success:   #059669;
            --text:      #1E293B;

            /* Neutrals */
            --gray-800: #1F2937;
            --gray-700: #374151;
            --gray-600: #4B5563;
            --gray-500: #6B7280;
            --gray-400: #9CA3AF;
            --gray-300: #D1D5DB;
            --gray-200: #E5E7EB;
            --gray-100: #F3F4F6;
            --gray-50:  #F9FAFB;

            /* Blue accent scale for students */
            --blue-700: #1D4ED8;
            --blue-600: #2563EB;
            --blue-500: #3B82F6;
            --blue-400: #60A5FA;
            --blue-100: #DBEAFE;
            --blue-50:  #EFF6FF;

            /* Shadows */
            --shadow-sm: 0 1px 4px rgba(0,0,0,0.07);
            --shadow-md: 0 4px 20px rgba(0,0,0,0.09);

            /* Radius */
            --r-sm: 8px;
            --r-md: 14px;
            --r-lg: 20px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
        }

        /* ── Animated background blobs (login screen only) ── */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.14;
            pointer-events: none;
            z-index: 0;
        }
        .blob-1 { width: 500px; height: 500px; background: #3B82F6; top: -100px; right: -80px; }
        .blob-2 { width: 420px; height: 420px; background: #6366F1; bottom: -80px; left: -60px; }

        /* ════════════════════════
           LOGIN SCREEN
        ════════════════════════ */
        #loginScreen {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(160deg, #1D4ED8 0%, #2563EB 50%, #1E40AF 100%);
        }

        .login-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 28px;
            padding: 48px 44px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 8px 56px rgba(0,0,0,0.4), 0 0 40px rgba(59,130,246,0.18);
            color: white;
        }

        .logo-ring {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #2563EB, #7C3AED);
            border-radius: 20px;
            font-size: 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 24px rgba(37,99,235,0.45);
        }

        .login-card h2 {
            font-size: 24px;
            font-weight: 700;
            color: #DBEAFE;
            margin-bottom: 6px;
        }
        .login-card > p {
            font-size: 14px;
            color: rgba(219,234,254,0.55);
            margin-bottom: 34px;
        }

        .field {
            margin-bottom: 16px;
            text-align: left;
        }
        .field label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: rgba(219,234,254,0.65);
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 13px 16px;
            background: rgba(255,255,255,0.07);
            border: 1.5px solid rgba(255,255,255,0.13);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.18s, box-shadow 0.18s;
            box-sizing: border-box;
        }
        .input-group input::placeholder { color: rgba(255,255,255,0.28); }
        .input-group input:focus {
            outline: none;
            border-color: rgba(96,165,250,0.75);
            background: rgba(255,255,255,0.11);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.22);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            background: linear-gradient(135deg, #2563EB 0%, #7C3AED 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.18s, box-shadow 0.18s;
            box-shadow: 0 4px 20px rgba(37,99,235,0.45);
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(37,99,235,0.6); }
        .btn-login:active { transform: translateY(0); }

        #loginError {
            color: #FCA5A5;
            font-size: 13px;
            margin-top: 14px;
            display: none;
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.25);
            border-radius: 10px;
            padding: 10px 14px;
            text-align: left;
        }

        /* ════════════════════════
           DASHBOARD SCREEN
        ════════════════════════ */
        #dashboardScreen {
            background: var(--bg);
            min-height: 100vh;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: linear-gradient(90deg, #1D4ED8 0%, #2563EB 60%, #3B82F6 100%);
            color: white;
            padding: 18px 36px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 20px rgba(37,99,235,0.22);
        }
        .header h2 {
            font-size: 18px;
            font-weight: 700;
            color: #EFF6FF;
            margin: 0;
        }
        .header h2 span { color: #BFDBFE; }

        /* Password change bar */
        .pw-bar {
            background: rgba(255,255,255,0.82);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--gray-200);
            padding: 10px 36px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .pw-bar h4 {
            font-size: 13px;
            font-weight: 700;
            color: var(--gray-700);
            white-space: nowrap;
            margin: 0;
        }

        /* Main content */
        .main-content {
            padding: 32px 36px;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
        }
        .main-content h3 {
            font-size: 17px;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Exam grid */
        .exam-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 18px;
        }

        /* Exam card (also generated by JS) */
        .exam-card {
            background: white;
            padding: 24px;
            border-radius: var(--r-lg);
            box-shadow: 0 2px 8px rgba(37,99,235,0.08), 0 1px 3px rgba(0,0,0,0.05);
            border: 1.5px solid var(--gray-200);
            border-left: 5px solid var(--blue-500);
            transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s;
        }
        .exam-card:hover {
            box-shadow: 0 6px 24px rgba(37,99,235,0.14), 0 2px 8px rgba(0,0,0,0.06);
            transform: translateY(-3px);
            border-left-color: var(--blue-400);
        }
        .exam-card h3 {
            margin: 0 0 10px;
            color: var(--gray-800);
            font-size: 16px;
            font-weight: 700;
            border: none;
            padding: 0;
        }
        .exam-card p {
            margin: 5px 0;
            color: var(--gray-500);
            font-size: 13px;
        }
        .exam-card p strong { color: var(--gray-700); }

        /* ── Buttons (global for dashboard) ── */
        button {
            padding: 9px 16px;
            border: none;
            border-radius: var(--r-sm);
            background: var(--blue-500);
            color: white;
            cursor: pointer;
            font-weight: 700;
            font-size: 13px;
            font-family: inherit;
            transition: background 0.18s, transform 0.15s;
        }
        button:hover { background: var(--blue-600); }

        .btn-start {
            background: var(--success);
            margin-top: 16px;
            width: 100%;
            padding: 11px 18px;
            font-size: 14px;
            border-radius: var(--r-md);
            box-shadow: 0 2px 10px rgba(16,185,129,0.3);
        }
        .btn-start:hover { background: #059669; transform: translateY(-1px); }

        .btn-logout {
            background: transparent;
            border: 1.5px solid rgba(255,255,255,0.35);
            color: white;
            font-size: 13px;
            border-radius: var(--r-sm);
            padding: 8px 16px;
        }
        .btn-logout:hover {
            background: rgba(255,255,255,0.12);
            border-color: rgba(255,255,255,0.6);
        }

        /* Inline password bar input + button */
        .pw-bar input[type="password"] {
            padding: 8px 12px;
            border: 1.5px solid var(--gray-300);
            border-radius: var(--r-sm);
            font-family: inherit;
            font-size: 13px;
            flex-grow: 1;
            max-width: 240px;
            transition: border-color 0.18s;
        }
        .pw-bar input[type="password"]:focus {
            outline: none;
            border-color: var(--blue-400);
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray-500);
        }
        .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state p { font-size: 15px; }

        /* Loading state */
        .loading-text {
            color: var(--gray-500);
            font-size: 14px;
            padding: 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Account settings panel (hidden by default) */
        #accountSettingsPanel { display: none; }

        .btn-settings {
            background: rgba(255,255,255,0.10);
            border: 1.5px solid rgba(255,255,255,0.28);
            color: white;
            font-size: 13px;
            border-radius: var(--r-sm);
            padding: 8px 14px;
        }
        .btn-settings:hover {
            background: rgba(255,255,255,0.18);
            border-color: rgba(255,255,255,0.5);
        }

        /* Responsive */
        @media (max-width: 640px) {
            .header { padding: 14px 20px; }
            .pw-bar { padding: 10px 20px; }
            .main-content { padding: 20px; }
            .exam-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div id="loginScreen">
        <div class="login-card">
            <div class="logo-ring">📖</div>
            <h2>Student Login</h2>
            <p>Secure LAN Exam Platform</p>

            <div class="field">
                <label>University ID</label>
                <div class="input-group">
                    <input type="text" id="uniId" placeholder="e.g. 2024001">
                </div>
            </div>
            <div class="field">
                <label>Password</label>
                <div class="input-group">
                    <input type="password" id="password" placeholder="••••••••">
                </div>
            </div>

            <button class="btn-login" onclick="login()">Log In</button>
            <p id="loginError"></p>
        </div>
    </div>

    <div id="dashboardScreen" style="display: none; width: 100%; max-width: 1000px; margin: 20px auto;">

        <div class="header">
            <h2>Welcome, <span id="studentName"></span>!</h2>
            <div style="display:flex; gap:10px; align-items:center;">
                <button class="btn-settings" onclick="toggleSettings()">&#9881; Account Settings</button>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </div>

        <div id="accountSettingsPanel">
            <div style="background: white; padding: 15px; margin: 20px 0; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 10px;">
                <h4 style="margin: 0; color: var(--primary);">Change Password:</h4>
                <input type="password" id="newPassword" placeholder="Enter new password" style="padding: 8px; border: 1px solid #ccc; border-radius: 5px; flex-grow: 1; max-width: 250px;">
                <button onclick="changePassword()" style="padding: 8px 15px; background: var(--accent); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Update</button>
            </div>
        </div>

        <div class="exam-grid" id="examGrid">
        </div>

    </div>

    <script>
        let studentToken = localStorage.getItem('studentToken');

        // Auto-login if token exists
        if (studentToken) showDashboard();

        async function login() {
            const uniId = document.getElementById('uniId').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('loginError');

            try {
                const res = await fetch('/api/student/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ university_id: uniId, password: password })
                });

                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('studentToken', data.token);
                    localStorage.setItem('studentName', data.name);
                    studentToken = data.token;
                    showDashboard();
                } else {
                    errorMsg.innerText = data.error || "Login failed.";
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.innerText = "Server connection error.";
                errorMsg.style.display = 'block';
            }
        }

        function showDashboard() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboardScreen').style.display = 'flex';
            document.getElementById('studentName').innerText = localStorage.getItem('studentName'); // CORRECT ID
            loadExams();
        }

        function logout() {
            localStorage.removeItem('studentToken');
            localStorage.removeItem('studentName');
            window.location.href = '/student-login.html';
        }

        function toggleSettings() {
            const panel = document.getElementById('accountSettingsPanel');
            panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
        }

        async function changePassword() {
            const newPassword = document.getElementById('newPassword').value;

            if (!newPassword || newPassword.length < 4) {
                return alert("Please enter a new password (must be at least 4 characters).");
            }
            if (!confirm("Are you sure you want to change your password?")) {
                return;
            }

            try {
                const res = await fetch('/api/student/change-password', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('studentToken')}`
                    },
                    body: JSON.stringify({ newPassword: newPassword })
                });

                const data = await res.json();

                if (data.success) {
                    alert("Success! Your password has been changed.");
                    document.getElementById('newPassword').value = ''; // Clear the input box
                } else {
                    alert("Error: " + data.error);
                }
            } catch (err) {
                console.error(err);
                alert("Failed to connect to the server.");
            }
        }

        async function loadExams() {
            const grid = document.getElementById('examGrid');
            grid.innerHTML = '<p>Loading exams...</p>';

            try {
                const res = await fetch('/api/student/exams', {
                    headers: { 'Authorization': `Bearer ${studentToken}` }
                });

                if (res.status === 401 || res.status === 403) {
                    localStorage.removeItem('studentToken');
                    localStorage.removeItem('studentName');
                    window.location.href = '/student-login.html';
                    return;
                }

                const exams = await res.json();

                if (!Array.isArray(exams) || exams.length === 0) {
                    grid.innerHTML = '<p>No active exams available at this time.</p>';
                    return;
                }

                grid.innerHTML = ''; // Clear loading text
                exams.forEach(exam => {
                    const isResume = exam.my_status === 'in_progress';
                    const btnLabel = isResume ? '&#9654; Resume Exam' : 'Take Exam';
                    const btnStyle = isResume ? 'background:#D97706;' : '';
                    const resumeBadge = isResume
                        ? `<p style="color:#D97706; font-size:12px; font-weight:700; margin-top:6px;">&#9888; In Progress — your time is running!</p>`
                        : '';
                    grid.innerHTML += `
                        <div class="exam-card">
                            <h3>${exam.title}</h3>
                            <p><strong>Professor:</strong> ${exam.professor_name}</p>
                            <p><strong>Duration:</strong> ${exam.duration_minutes} Minutes</p>
                            ${resumeBadge}
                            <button class="btn-start" style="${btnStyle}" onclick="startExam(${exam.id})">${btnLabel}</button>
                        </div>
                    `;
                });
            } catch (err) {
                grid.innerHTML = '<p style="color:red;">Failed to load exams.</p>';
            }
        }

        function startExam(examId) {
            // Redirect to the exam room and pass the exam ID in the URL
            window.location.href = `/student_exam.html?examId=${examId}`;
        }
    </script>
</body>
</html>
