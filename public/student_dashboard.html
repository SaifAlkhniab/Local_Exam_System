<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal | SLEP</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f4f6f9;
            --success: #27ae60;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            color: var(--text);
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
        }

        /* --- Login Box --- */
        #loginScreen {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: bold; }
        .input-group input { 
            width: 100%; padding: 12px; border: 1px solid #ccc; 
            border-radius: 5px; font-size: 16px; box-sizing: border-box;
        }
        
        button {
            width: 100%; padding: 12px; font-size: 16px; font-weight: bold;
            background: var(--accent); color: white; border: none; 
            border-radius: 5px; cursor: pointer; transition: 0.2s;
        }
        button:hover { background: #2980b9; }

        /* --- Dashboard Screen --- */
        #dashboardScreen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            background: var(--bg);
        }

        .header {
            background: var(--primary); color: white; padding: 20px 40px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .main-content { padding: 40px; max-width: 1000px; margin: 0 auto; width: 100%; box-sizing: border-box;}

        .exam-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px;
        }

        .exam-card {
            background: white; padding: 25px; border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 5px solid var(--accent);
        }

        .exam-card h3 { margin: 0 0 10px 0; color: var(--primary); }
        .exam-card p { margin: 5px 0; color: #666; font-size: 14px; }
        .btn-start { background: var(--success); margin-top: 15px; width: auto; padding: 10px 20px; }
        .btn-start:hover { background: #219653; }
        .btn-logout { background: transparent; border: 1px solid white; width: auto; }
        .btn-logout:hover { background: rgba(255,255,255,0.1); }

    </style>
</head>
<body>

    <div id="loginScreen">
        <h2 style="color: var(--primary); margin-bottom: 30px;">Student Login</h2>
        <div class="input-group">
            <label>University ID</label>
            <input type="text" id="uniId" placeholder="e.g. 2024001">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button onclick="login()">Login</button>
        <p id="loginError" style="color: red; display: none; margin-top: 15px; font-size: 14px;"></p>
    </div>

    <div id="dashboardScreen" style="display: none; width: 100%; max-width: 1000px; margin: 20px auto;">
        
        <div class="header">
            <h2>Welcome, <span id="studentName"></span>!</h2>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>

        <div style="background: white; padding: 15px; margin: 20px 0; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 10px;">
            <h4 style="margin: 0; color: var(--primary);">Change Password:</h4>
            <input type="password" id="newPassword" placeholder="Enter new password" style="padding: 8px; border: 1px solid #ccc; border-radius: 5px; flex-grow: 1; max-width: 250px;">
            <button onclick="changePassword()" style="padding: 8px 15px; background: var(--accent); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Update</button>
        </div>

        <div class="container" id="examGrid">
            </div>

    </div>

    <script>
        let studentToken = localStorage.getItem('studentToken');
        
        // Auto-login if token exists
        if (studentToken) showDashboard();

        async function login() {
            const uniId = document.getElementById('uniId').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('loginError');

            try {
                const res = await fetch('/api/student/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ university_id: uniId, password: password })
                });

                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('studentToken', data.token);
                    localStorage.setItem('studentName', data.name);
                    studentToken = data.token;
                    showDashboard();
                } else {
                    errorMsg.innerText = data.error || "Login failed.";
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.innerText = "Server connection error.";
                errorMsg.style.display = 'block';
            }
        }

        function showDashboard() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboardScreen').style.display = 'flex';
            document.getElementById('studentName').innerText = localStorage.getItem('studentName'); // CORRECT ID
            loadExams();
        }

        function logout() {
            localStorage.removeItem('studentToken');
            localStorage.removeItem('studentName');
            window.location.reload();
        }

        async function changePassword() {
            const newPassword = document.getElementById('newPassword').value;
            
            if (!newPassword || newPassword.length < 4) {
                return alert("Please enter a new password (must be at least 4 characters).");
            }
            if (!confirm("Are you sure you want to change your password?")) {
                return;
            }

            try {
                const res = await fetch('/api/student/change-password', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('studentToken')}`
                    },
                    body: JSON.stringify({ newPassword: newPassword })
                });

                const data = await res.json();

                if (data.success) {
                    alert("Success! Your password has been changed.");
                    document.getElementById('newPassword').value = ''; // Clear the input box
                } else {
                    alert("Error: " + data.error);
                }
            } catch (err) {
                console.error(err);
                alert("Failed to connect to the server.");
            }
        }

        async function loadExams() {
            const grid = document.getElementById('examGrid');
            grid.innerHTML = '<p>Loading exams...</p>';

            try {
                const res = await fetch('/api/student/exams', {
                    headers: { 'Authorization': `Bearer ${studentToken}` }
                });
                const exams = await res.json();

                if (exams.length === 0) {
                    grid.innerHTML = '<p>No active exams available at this time.</p>';
                    return;
                }

                grid.innerHTML = ''; // Clear loading text
                exams.forEach(exam => {
                    grid.innerHTML += `
                        <div class="exam-card">
                            <h3>${exam.title}</h3>
                            <p><strong>Professor:</strong> ${exam.professor_name}</p>
                            <p><strong>Duration:</strong> ${exam.duration_minutes} Minutes</p>
                            <button class="btn-start" onclick="startExam(${exam.id})">Take Exam</button>
                        </div>
                    `;
                });
            } catch (err) {
                grid.innerHTML = '<p style="color:red;">Failed to load exams.</p>';
            }
        }

        function startExam(examId) {
            // Redirect to the exam room and pass the exam ID in the URL
            window.location.href = `/student_exam.html?examId=${examId}`;
        }
    </script>
</body>
</html>
