<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLEP — Class Join Screen</title>
    <style>
        :root {
            --brand-900: #1E1B4B;
            --brand-800: #312E81;
            --brand-500: #4F46E5;
            --brand-400: #6366F1;
            --brand-200: #C7D2FE;
            --brand-100: #E0E7FF;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1E1B4B 0%, #312E81 50%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        /* Animated background blobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.13;
            pointer-events: none;
            z-index: 0;
        }
        .blob-1 {
            width: 600px; height: 600px;
            background: #4F46E5;
            top: -150px; left: -150px;
            animation: b1 14s ease-in-out infinite;
        }
        .blob-2 {
            width: 500px; height: 500px;
            background: #7C3AED;
            bottom: -120px; right: -120px;
            animation: b2 11s ease-in-out infinite;
        }
        .blob-3 {
            width: 360px; height: 360px;
            background: #06B6D4;
            top: 45%; left: 52%;
            transform: translate(-50%, -50%);
            animation: b3 17s ease-in-out infinite;
        }
        @keyframes b1 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(40px, 25px) scale(1.06); } }
        @keyframes b2 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-30px, -20px) scale(1.09); } }
        @keyframes b3 { 0%,100% { transform: translate(-50%,-50%) scale(1); } 50% { transform: translate(-47%,-53%) scale(1.12); } }

        .lobby-card {
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 32px;
            padding: 52px 56px 40px;
            text-align: center;
            box-shadow: 0 8px 56px rgba(0,0,0,0.45), 0 0 48px rgba(79,70,229,0.2);
            max-width: 500px;
            width: 92%;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(79,70,229,0.28);
            border: 1px solid rgba(99,102,241,0.4);
            border-radius: 999px;
            padding: 7px 18px;
            font-size: 12px;
            font-weight: 700;
            color: #C7D2FE;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 28px;
        }

        .badge-dot {
            width: 7px; height: 7px;
            background: #4ADE80;
            border-radius: 50%;
            animation: pulse-dot 2s ease-in-out infinite;
            box-shadow: 0 0 6px #4ADE80;
        }
        @keyframes pulse-dot {
            0%,100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.8); }
        }

        h1 {
            font-size: 23px;
            font-weight: 700;
            color: #E0E7FF;
            line-height: 1.45;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: rgba(199,210,254,0.6);
            margin-bottom: 32px;
            line-height: 1.5;
        }

        /* QR Code container */
        .qr-frame {
            display: inline-block;
            background: white;
            border-radius: 20px;
            padding: 18px;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.08),
                0 0 48px rgba(79,70,229,0.5),
                0 8px 32px rgba(0,0,0,0.35);
            margin-bottom: 28px;
            position: relative;
        }

        /* Corner decorations on QR frame */
        .qr-frame::before,
        .qr-frame::after {
            content: '';
            position: absolute;
            width: 22px; height: 22px;
            border-color: #6366F1;
            border-style: solid;
        }
        .qr-frame::before {
            top: -2px; left: -2px;
            border-width: 3px 0 0 3px;
            border-radius: 4px 0 0 0;
        }
        .qr-frame::after {
            bottom: -2px; right: -2px;
            border-width: 0 3px 3px 0;
            border-radius: 0 0 4px 0;
        }

        #qrImage {
            display: none;
            width: 224px;
            height: 224px;
            border-radius: 10px;
        }

        .qr-placeholder {
            width: 224px;
            height: 224px;
            background: #f0f2ff;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #9CA3AF;
            font-size: 13px;
        }

        .spinner {
            width: 34px; height: 34px;
            border: 3px solid #E0E7FF;
            border-top-color: #4F46E5;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* URL chip */
        .url-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            padding: 10px 18px;
            margin-bottom: 24px;
            font-size: 13px;
            color: rgba(199,210,254,0.75);
            word-break: break-all;
        }

        .url-chip strong {
            color: #A5B4FC;
            font-family: 'Cascadia Code', 'Consolas', monospace;
            font-size: 14px;
        }

        .url-icon { font-size: 15px; flex-shrink: 0; }

        /* Error state */
        .url-chip.error { color: #FCA5A5; border-color: rgba(239,68,68,0.25); }

        /* Divider + footer */
        .footer-divider {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.09);
            margin: 4px 0 16px;
        }

        .prof-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: rgba(165,180,252,0.55);
            font-size: 13px;
            text-decoration: none;
            padding: 7px 14px;
            border-radius: 10px;
            transition: 0.2s;
            font-weight: 500;
        }

        .prof-link:hover {
            color: #A5B4FC;
            background: rgba(165,180,252,0.09);
        }

        /* Refresh hint */
        .refresh-hint {
            position: fixed;
            bottom: 24px;
            font-size: 12px;
            color: rgba(255,255,255,0.2);
            z-index: 1;
            letter-spacing: 0.03em;
        }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="lobby-card">

        <div class="badge">
            <span class="badge-dot"></span>
            SLEP v3.0 &nbsp;—&nbsp; Server Live
        </div>

        <h1>Connect to the Class Wi-Fi<br>and Scan to Join</h1>
        <p class="subtitle">Open your phone camera and point it at the QR code below</p>

        <div class="qr-frame">
            <div class="qr-placeholder" id="qrPlaceholder">
                <div class="spinner"></div>
                <span>Generating QR…</span>
            </div>
            <img id="qrImage" alt="Scan to join exam portal">
        </div>

        <div class="url-chip" id="urlChip">
            <span class="url-icon">🔗</span>
            <span id="urlText">Detecting server address…</span>
        </div>

        <hr class="footer-divider">

        <a href="/faculty-gateway.html" class="prof-link">
            Professor Login &nbsp;→
        </a>

    </div>

    <p class="refresh-hint">Page auto-refreshes every 60 s &nbsp;·&nbsp; SLEP v3.0</p>

    <script>
        async function loadLobbyData() {
            try {
                const res = await fetch('/api/get-host-ip');
                const data = await res.json();

                if (data.success && data.qrDataUrl) {
                    const img = document.getElementById('qrImage');
                    const placeholder = document.getElementById('qrPlaceholder');

                    img.src = data.qrDataUrl;
                    img.style.display = 'block';
                    placeholder.style.display = 'none';

                    document.getElementById('urlText').innerHTML = `<strong>${data.url}</strong>`;
                } else {
                    document.getElementById('qrPlaceholder').innerHTML =
                        '<span style="color:#f87171;font-size:13px;">Could not detect Wi-Fi IP.<br>Is the router connected?</span>';
                    document.getElementById('urlChip').classList.add('error');
                    document.getElementById('urlText').textContent = 'Network detection failed';
                }
            } catch (err) {
                document.getElementById('qrPlaceholder').innerHTML =
                    '<span style="color:#f87171;font-size:13px;">Server offline</span>';
            }
        }

        loadLobbyData();

        // Silently refresh IP every 60 seconds (e.g. if router reconnects)
        setInterval(loadLobbyData, 60000);
    </script>

</body>
</html>
